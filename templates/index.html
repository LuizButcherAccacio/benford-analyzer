```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benford Analyzer</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 18px;
            font-weight: bold;
            color: #374151;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 14px;
        }

        .highlight {
            color: #2563eb;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>📊 Butcher´s Benford Analyzer</h1>

            <p class="subtitle">
                Analyze the distribution of leading digits in your data
                and compare the results with Benford's Law.
            </p>

            <form action="/analisar" method="post" enctype="multipart/form-data">

                <label for="coluna">Column Name</label>
                <input
                    type="text"
                    id="coluna"
                    name="coluna"
                    placeholder="Example: value, revenue, quantity"
                    required
                >

                <label for="file">CSV File</label>
                <input
                    type="file"
                    id="file"
                    name="file"
                    accept=".csv"
                    required
                >

                <button type="submit">
                    Analyze File
                </button>

            </form>

        </div>

    </div>

    <footer>
        Developed by <span class="highlight">Luiz Butcher Accacio</span> •
        Powered by FastAPI
    </footer>

</body>

</html>
