<!DOCTYPE html>
<html>
<head>
    <title>Benford Analyzer</title>
</head>
<body>

    <h1>Analisador da Lei de Benford</h1>

    <form action="/analisar" method="post" enctype="multipart/form-data">

        <label>Nome da coluna:</label>
        <input type="text" name="coluna">

        <br><br>

        <label>Arquivo CSV:</label>
        <input type="file" name="file">

        <br><br>

        <button type="submit">
            Analisar
        </button>

    </form>

</body>
</html>
